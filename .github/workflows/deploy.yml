# ═══════════════════════════════════════════════════════════════════════════════
# NEXEAGLE WEBSITE — CI/CD Pipeline  (Next.js → Node container on GHCR)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Stage 1 — Build       npm ci + next build  (runs on push + PRs)
#   Stage 2 — Deploy      build Node image (next start) → push GHCR → run on VM
#             dev branch  -> Dev VM   (151.185.45.77) :82
#             main branch -> Prod VM  (151.185.45.67) :8080
#
# The site is served on host port 8080 on Prod (port 80 is used by 1Rad easyrad
# UI there). On Dev, 8080 is already held by Watchtower's HTTP API (host-network
# mode, invisible to `docker ps --filter publish=`) — Dev uses :82 instead,
# following the existing convention on that VM (81=easyhms-web-dev, 83=cms-web-dev).
#
# ─────────────────────────────────────────────────────────────────────────────
# SECRETS (Settings → Secrets → Actions):
#   PROD_SSH_HOST         151.185.45.67
#   PROD_SSH_USER         root
#   PROD_SSH_KEY_B64      base64-encoded SSH private key for Prod App VM
#   EASYHMS_PROD_API_KEY  OPTIONAL — the public API doesn't require a key (see
#                         PublicApiKeyFilter), so this can be left unset and the site
#                         still works fully. Only set it if this deployment's traffic
#                         should be identified/revocable separately from anonymous
#                         callers. Issued via easyHMSAPI's tools/IssuePublicApiKey
#                         console tool (see easyHMSAPI/docs/OPS-ISSUE-PUBLIC-API-KEY.md).
#   SSH_HOST              151.185.45.77 (Dev App VM — legacy unprefixed name, predates the
#                         dev/prod split; password auth via appleboy/ssh-action, not a key)
#   SSH_USER              root
#   SSH_PASSWORD          SSH password for the Dev App VM
#   EASYHMS_DEV_API_KEY   OPTIONAL, same as EASYHMS_PROD_API_KEY, for the dev environment.
#   ANTHROPIC_API_KEY     OPTIONAL — powers the AI search fallback (app/api/search/parse).
#                         Same key used for both dev and prod. Leave unset to disable —
#                         search stays literal-keyword-only, no error, nothing breaks.
#   INTERNAL_PROXY_SECRET OPTIONAL — lets easyHMSAPI's public rate limiters see each real
#                         visitor's IP instead of this container's own IP (every call to the
#                         API is server-to-server — see src/lib/api/server.ts). Same key used
#                         for both dev and prod; must match Internal:ProxyForwardingSecret in
#                         the easyHMSAPI repo's own deploy secrets exactly. Leave unset on
#                         either side to keep the previous (site-wide-budget) rate-limit
#                         behavior — nothing breaks either way.
# ═══════════════════════════════════════════════════════════════════════════════

name: NexEagle Website — CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: nexeagle-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (validation)
        run: npm run build

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Stage 2 — Deploy → Dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'
    environment: development

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/nexeagle-website" >> "$GITHUB_OUTPUT"
          echo "tag=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          EASYHMS_API_KEY: ${{ secrets.EASYHMS_DEV_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROXY_SECRET: ${{ secrets.INTERNAL_PROXY_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 10m
          envs: IMAGE,PULL_TOKEN,ACTOR,EASYHMS_API_KEY,ANTHROPIC_API_KEY,PROXY_SECRET
          script: |
            set -e
            IMAGE_LC=$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')
            echo "$PULL_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull "$IMAGE_LC"
            docker rm -f nexeagle-website-dev 2>/dev/null || true
            PORT_HOG=$(docker ps -q --filter "publish=82")
            [ -n "$PORT_HOG" ] && docker rm -f $PORT_HOG || true

            for i in 1 2 3 4 5; do
              if docker run -d --name nexeagle-website-dev --restart unless-stopped \
                  -p 82:80 \
                  -e EASYHMS_API_BASE_URL='http://151.185.45.77:5001' \
                  -e EASYHMS_API_KEY="$EASYHMS_API_KEY" \
                  -e EASYHMS_API_KEY_HEADER='X-Api-Key' \
                  -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
                  -e EASYHMS_TRUSTED_PROXY_SECRET="$PROXY_SECRET" \
                  "$IMAGE_LC"; then
                break
              fi
              echo "Port 82 still busy (attempt $i) — what's holding it:"
              (ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true) | grep ':82 ' || echo "  (nothing found via ss/netstat)"
              docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
              if [ "$i" = 5 ]; then
                echo "Giving up after 5 attempts — see diagnostics above for what's actually on :82."
                exit 1
              fi
              sleep 3
              docker rm -f nexeagle-website-dev 2>/dev/null || true
            done
            docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' \
                http://${{ secrets.SSH_HOST }}:82 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ NexEagle Website (dev) is live" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs nexeagle-website-dev"
          exit 0

      - name: Write summary
        if: always()
        run: |
          echo "## 🌐 NexEagle Website — Dev" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Live at http://${{ secrets.SSH_HOST }}:82" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Stage 2 — Deploy → Prod"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/nexeagle-website" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY_B64 }}" | base64 -d > "$GITHUB_WORKSPACE/deploy_key"
          chmod 600 "$GITHUB_WORKSPACE/deploy_key"

      - name: Deploy to Prod VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          EASYHMS_API_KEY: ${{ secrets.EASYHMS_PROD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROXY_SECRET: ${{ secrets.INTERNAL_PROXY_SECRET }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          # appleboy/ssh-action runs inside its own Docker container, which only mounts the
          # checked-out workspace (not /tmp on the runner) — the key file must live here, not
          # in /tmp, or getKeyFile fails with "no such file or directory" (see incident 2026-07-20).
          key_path: deploy_key
          port: 22
          command_timeout: 10m
          envs: IMAGE,PULL_TOKEN,ACTOR,EASYHMS_API_KEY,ANTHROPIC_API_KEY,PROXY_SECRET
          script: |
            set -e
            IMAGE_LC=$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')
            echo "$PULL_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull "$IMAGE_LC"
            docker rm -f nexeagle-website 2>/dev/null || true
            PORT_HOG=$(docker ps -q --filter "publish=8080")
            [ -n "$PORT_HOG" ] && docker rm -f $PORT_HOG || true

            for i in 1 2 3 4 5; do
              if docker run -d --name nexeagle-website --restart unless-stopped \
                  -p 8080:80 \
                  -e EASYHMS_API_BASE_URL='https://1hms-api.nexeagle.com' \
                  -e EASYHMS_API_KEY="$EASYHMS_API_KEY" \
                  -e EASYHMS_API_KEY_HEADER='X-Api-Key' \
                  -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
                  -e EASYHMS_TRUSTED_PROXY_SECRET="$PROXY_SECRET" \
                  "$IMAGE_LC"; then
                break
              fi
              echo "Port 8080 still busy (attempt $i) — what's holding it:"
              (ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true) | grep ':8080' || echo "  (nothing found via ss/netstat)"
              docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
              if [ "$i" = 5 ]; then
                echo "Giving up after 5 attempts — see diagnostics above for what's actually on :8080."
                exit 1
              fi
              sleep 3
              docker rm -f nexeagle-website 2>/dev/null || true
            done
            docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' \
                http://${{ secrets.PROD_SSH_HOST }}:8080 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ NexEagle Website is live" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs nexeagle-website"
          exit 0

      - name: Write summary
        if: always()
        run: |
          echo "## 🌐 NexEagle Website — Prod" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Live at http://${{ secrets.PROD_SSH_HOST }}:8080" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
