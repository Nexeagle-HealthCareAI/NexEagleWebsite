# =========================================================
# Azure Static Web App deployment for NexEagleClientWebApp
# =========================================================

trigger:
  branches:
    include:
      - main
      - release-*
      - feature/*

pool:
  vmImage: ubuntu-latest

variables:
  # Bring in secrets (contains SWA_DEPLOYMENT_TOKEN_WEB_DEV_LANDINPAGE)
  - group: nexeagleintra-dev-secrets

  # Additional variables
  - name: resourceGroupName
    value: ClientFrontProd
  - name: staticWebAppName
    value: NexEagleClientWebApp
  - name: serviceConnectionName
    value: nexeagleintra-dev

stages:
- stage: BuildAndDeploy
  displayName: Build and deploy Static Web App
  jobs:
  - job: BuildAndDeployJob
    displayName: Build and deploy
    steps:
    - checkout: self

    - script: npm install
      displayName: Install dependencies

    - script: npm run build
      displayName: Build app

    - script: ls -l dist
      displayName: List dist contents

    - task: AzureStaticWebApp@0
      displayName: Deploy to Azure Static Web Apps
      inputs:
        app_location: "."
        api_location: ""
        output_location: "dist"
      env:
        azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_DEV_LANDINPAGE)
