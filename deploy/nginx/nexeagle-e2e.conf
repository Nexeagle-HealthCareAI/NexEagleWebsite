# nginx server block for the NexEagle e2e VM.
# This is the VM equivalent of staticwebapp.config.json (SPA fallback,
# asset caching, and security headers).
#
# Install on the VM:
#   sudo cp nexeagle-e2e.conf /etc/nginx/sites-available/nexeagle-e2e
#   sudo ln -sf /etc/nginx/sites-available/nexeagle-e2e /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # Change to your e2e hostname, or use "_" to catch all on this VM.
    server_name e2e.nexeagle.com;

    # Must match DEPLOY_PATH in .github/workflows/deploy-e2e.yml
    root /var/www/nexeagle-e2e;
    index index.html;

    # Security headers (mirrors globalHeaders in staticwebapp.config.json).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable -> cache for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-declare security headers: any add_header in a location block
        # drops the ones inherited from the server block.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # SPA fallback: every unmatched route serves index.html so client-side
    # routing (react-router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# For HTTPS, run certbot after this is live:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d e2e.nexeagle.com
# certbot rewrites this block to add the listen 443 / ssl_certificate lines.
