# nginx server block for the NexEagle UI.
# Served on its OWN port (8080) so it coexists with whatever already runs on
# port 80 on the VM. This is the VM equivalent of staticwebapp.config.json
# (SPA fallback, asset caching, and security headers).
#
# Installed automatically by deploy/setup-nginx.sh from the GitHub Actions
# workflow. To change the port, edit BOTH listen lines below.

server {
    listen 8080;
    listen [::]:8080;

    # Bare-IP friendly: answers for any host on this port.
    server_name _;

    # Must match DEPLOY_PATH in the workflow (default /var/www/nexeagle).
    root /var/www/nexeagle;
    index index.html;

    # Security headers (mirrors globalHeaders in staticwebapp.config.json).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable -> cache for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-declare security headers: any add_header in a location block
        # drops the ones inherited from the server block.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # SPA fallback: every unmatched route serves index.html so client-side
    # routing (react-router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
