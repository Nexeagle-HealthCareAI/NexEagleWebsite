# nginx server block for a NexEagle VM (use on BOTH the dev and prod VMs).
# This is the VM equivalent of staticwebapp.config.json (SPA fallback,
# asset caching, and security headers).
#
# Per VM, adjust:
#   - server_name : dev.nexeagle.com  (dev VM)   /  www.nexeagle.com (prod VM)
#   - root        : must match DEPLOY_PATH for that environment
#
# Install on the VM:
#   sudo cp nexeagle.conf /etc/nginx/sites-available/nexeagle
#   sudo ln -sf /etc/nginx/sites-available/nexeagle /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # dev VM: dev.nexeagle.com   |   prod VM: www.nexeagle.com   |   or "_" to catch all
    server_name dev.nexeagle.com;

    # Must match DEPLOY_PATH for this environment (default /var/www/nexeagle).
    root /var/www/nexeagle;
    index index.html;

    # Security headers (mirrors globalHeaders in staticwebapp.config.json).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable -> cache for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-declare security headers: any add_header in a location block
        # drops the ones inherited from the server block.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # SPA fallback: every unmatched route serves index.html so client-side
    # routing (react-router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# For HTTPS, run certbot after this is live:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d dev.nexeagle.com      # (or your prod hostname)
# certbot rewrites this block to add the listen 443 / ssl_certificate lines.
